<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quick API Test - AYP Tech</title>
    <style>
        body { font-family: Arial, sans-serif; max-width: 600px; margin: 50px auto; padding: 20px; }
        .test-result { padding: 15px; margin: 10px 0; border-radius: 5px; }
        .success { background: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
        .error { background: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }
        .info { background: #d1ecf1; color: #0c5460; border: 1px solid #bee5eb; }
        button { background: #6366f1; color: white; padding: 10px 20px; border: none; border-radius: 5px; cursor: pointer; margin: 5px; }
        button:disabled { opacity: 0.6; cursor: not-allowed; }
        pre { background: #f8f9fa; padding: 10px; border-radius: 5px; overflow-x: auto; }
    </style>
</head>
<body>
    <h1>Google Apps Script API Test</h1>
    
    <div class="test-result info">
        <strong>Testing URL:</strong><br>
        <code>https://script.google.com/macros/s/AKfycbz1kbtTskP-DTDhgDV9vUdt5NfnC4rZt0uc32BsWKFX4rs9lMqdfuz0xMGmcTPSapaNMQ/exec</code>
    </div>

    <button onclick="testGET()">Test GET Request</button>
    <button onclick="testPOST()">Test POST Request</button>
    <button onclick="testCORS()">Test CORS</button>
    
    <div id="results"></div>

    <script>
        const scriptURL = 'https://script.google.com/macros/s/AKfycbz1kbtTskP-DTDhgDV9vUdt5NfnC4rZt0uc32BsWKFX4rs9lMqdfuz0xMGmcTPSapaNMQ/exec';
        const resultsDiv = document.getElementById('results');
        
        function addResult(title, content, type = 'info') {
            const div = document.createElement('div');
            div.className = `test-result ${type}`;
            div.innerHTML = `<strong>${title}</strong><br><pre>${content}</pre>`;
            resultsDiv.appendChild(div);
        }
        
        async function testGET() {
            addResult('Testing GET Request...', 'Sending GET request to check if API is accessible', 'info');
            
            try {
                const response = await fetch(scriptURL, {
                    method: 'GET',
                    mode: 'cors'
                });
                
                addResult('GET Response Status', `${response.status} ${response.statusText}`, response.ok ? 'success' : 'error');
                
                const text = await response.text();
                addResult('GET Response Body', text, 'info');
                
                try {
                    const json = JSON.parse(text);
                    addResult('GET Parsed JSON', JSON.stringify(json, null, 2), 'success');
                } catch (e) {
                    addResult('GET JSON Parse Error', e.message, 'error');
                }
                
            } catch (error) {
                addResult('GET Request Error', error.message, 'error');
            }
        }
        
        async function testPOST() {
            addResult('Testing POST Request...', 'Sending POST request with test data', 'info');
            
            const testData = {
                timestamp: new Date().toISOString(),
                firstName: 'Test',
                lastName: 'User',
                email: 'test@example.com',
                phone: '1234567890',
                company: 'Test Company',
                industry: 'testing',
                service: 'test-service',
                teamSize: '1-10',
                budget: 'under-25k',
                timeline: 'immediately',
                message: 'This is a test submission from API test page',
                newsletter: 'yes',
                source: 'API Test',
                page: '/api-test'
            };
            
            addResult('POST Data Being Sent', JSON.stringify(testData, null, 2), 'info');
            
            try {
                const response = await fetch(scriptURL, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'text/plain',
                    },
                    body: JSON.stringify(testData)
                });
                
                addResult('POST Response Status', `${response.status} ${response.statusText}`, response.ok ? 'success' : 'error');
                
                const text = await response.text();
                addResult('POST Response Body', text, 'info');
                
                try {
                    const json = JSON.parse(text);
                    addResult('POST Parsed JSON', JSON.stringify(json, null, 2), json.status === 'success' ? 'success' : 'error');
                } catch (e) {
                    addResult('POST JSON Parse Error', e.message, 'error');
                }
                
            } catch (error) {
                addResult('POST Request Error', error.message, 'error');
            }
        }
        
        async function testCORS() {
            addResult('Testing CORS...', 'Checking cross-origin request handling', 'info');
            
            try {
                // Test with different content types
                const tests = [
                    { name: 'text/plain', contentType: 'text/plain' },
                    { name: 'application/json', contentType: 'application/json' },
                    { name: 'no content-type', contentType: null }
                ];
                
                for (const test of tests) {
                    try {
                        const headers = {};
                        if (test.contentType) {
                            headers['Content-Type'] = test.contentType;
                        }
                        
                        const response = await fetch(scriptURL, {
                            method: 'POST',
                            headers: headers,
                            body: JSON.stringify({ test: true, contentType: test.name })
                        });
                        
                        addResult(`CORS Test (${test.name})`, `Status: ${response.status} ${response.statusText}`, response.ok ? 'success' : 'error');
                        
                    } catch (error) {
                        addResult(`CORS Test Error (${test.name})`, error.message, 'error');
                    }
                }
                
            } catch (error) {
                addResult('CORS Test Error', error.message, 'error');
            }
        }
        
        // Auto-test on load
        window.addEventListener('load', function() {
            addResult('Page Loaded', 'Ready to test Google Apps Script API', 'success');
        });
    </script>
</body>
</html>
